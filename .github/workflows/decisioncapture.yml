name: DecisionCapture

on:
  pull_request:
    types: [closed]

jobs:
  capture:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Collect PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --repo "$REPOSITORY" \
            --json number,title,body,author,url,mergedAt,files,commits,reviews,comments,labels \
            > pr-context.json

          gh pr diff "$PR_NUMBER" --repo "$REPOSITORY" > pr.diff

      - name: Send PR context to DecisionCapture
        env:
          DECISIONCAPTURE_API_URL: ${{ secrets.DECISIONCAPTURE_API_URL }}
          DECISIONCAPTURE_TOKEN: ${{ secrets.DECISIONCAPTURE_TOKEN }}
        run: |
          jq --rawfile diff pr.diff '{
            prNumber: .number,
            title: .title,
            description: (.body // ""),
            mergedAt: .mergedAt,
            author: .author.login,
            url: .url,
            repository: env.GITHUB_REPOSITORY,
            filesChanged: [.files[].path? | select(type == "string" and length > 0)],
            commits: [.commits[].messageHeadline? | select(type == "string" and length > 0)],
            reviewers: [.reviews[].author.login? | select(type == "string" and length > 0)],
            reviewComments: (([.reviews[].body? | select(type == "string" and length > 0)] + [.comments[].body? | select(type == "string" and length > 0 and (contains("<!-- decisioncapture:review-comment -->") | not))]) | unique),
            approvals: [.reviews[] | select(.state == "APPROVED") | .author.login? | select(type == "string" and length > 0)],
            labels: [.labels[].name? | select(type == "string" and length > 0)],
            diffSummary: ($diff | split("\n") | map(select(
              startswith("diff --git") or
              startswith("@@") or
              startswith("+") or
              startswith("-")
            )) | .[:220] | join("\n"))
          }' pr-context.json > payload.json

          curl -fsS -X POST "$DECISIONCAPTURE_API_URL/decisions/analyze" \
            -H "content-type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            -H "x-decisioncapture-token: $DECISIONCAPTURE_TOKEN" \
            --data @payload.json \
            > decisioncapture-response.json
