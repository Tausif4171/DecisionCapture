services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decisioncapture
      POSTGRES_USER: decision
      POSTGRES_PASSWORD: decision
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision -d decisioncapture"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://decision:decision@postgres:5432/decisioncapture?schema=public
      REDIS_URL: redis://redis:6379
      QUEUE_MODE: bullmq
      QUEUE_WORKER_ENABLED: "true"
      FRONTEND_ORIGIN: http://localhost:3088
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
      USE_HEURISTIC_AI_FALLBACK: "true"
      AUTO_APPROVE_CONFIDENCE: 0.78
      DECISION_SCORE_THRESHOLD: 35
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-change-me}
      INGEST_API_TOKEN: ${INGEST_API_TOKEN:-local-demo-token}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: ["sh", "-c", "npm run db:push -w @decisioncapture/backend && npm run start -w @decisioncapture/backend"]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3088:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  ollama-data:
