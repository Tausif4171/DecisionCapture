services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env or your shell}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env or your shell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your shell}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env or your shell}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your shell}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env or your shell}?schema=public
      REDIS_URL: redis://redis:6379
      QUEUE_MODE: bullmq
      QUEUE_WORKER_ENABLED: "true"
      FRONTEND_ORIGIN: http://localhost:3088
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3088}
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
      USE_HEURISTIC_AI_FALLBACK: "true"
      AUTO_APPROVE_CONFIDENCE: 0.78
      DECISION_SCORE_THRESHOLD: 35
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      INGEST_API_TOKEN: ${INGEST_API_TOKEN:?Set INGEST_API_TOKEN in .env or your shell}
      DASHBOARD_API_TOKEN: ${DASHBOARD_API_TOKEN:?Set DASHBOARD_API_TOKEN in .env or your shell}
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-false}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: ["sh", "-c", "npm run db:deploy -w @decisioncapture/backend && npm run start -w @decisioncapture/backend"]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://backend:4000
      DASHBOARD_API_TOKEN: ${DASHBOARD_API_TOKEN:?Set DASHBOARD_API_TOKEN in .env or your shell}
      DASHBOARD_AUTH_ENABLED: ${DASHBOARD_AUTH_ENABLED:-true}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:?Set DASHBOARD_USERNAME in .env or your shell}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in .env or your shell}
      NEXT_PUBLIC_DEMO_MODE_ENABLED: ${NEXT_PUBLIC_DEMO_MODE_ENABLED:-false}
    ports:
      - "3088:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  ollama-data:
