services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decisioncapture_e2e
      POSTGRES_USER: decisioncapture_e2e
      POSTGRES_PASSWORD: decisioncapture_e2e_only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisioncapture_e2e -d decisioncapture_e2e"]
      interval: 2s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://decisioncapture_e2e:decisioncapture_e2e_only@postgres:5432/decisioncapture_e2e?schema=public
      REDIS_URL: redis://localhost:6379
      QUEUE_MODE: inline
      QUEUE_WORKER_ENABLED: "false"
      FRONTEND_ORIGIN: http://localhost:3098
      APP_BASE_URL: http://localhost:3098
      AUTH_MODE: disabled
      AI_PROVIDER: heuristic
      USE_HEURISTIC_AI_FALLBACK: "true"
      AUTO_APPROVE_CONFIDENCE: "0.99"
      DECISION_SCORE_THRESHOLD: "35"
      INGEST_API_TOKEN: decisioncapture-e2e-token
    ports:
      - "4010:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "npm run db:push -w @decisioncapture/backend && npm run start -w @decisioncapture/backend"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4000/health"]
      interval: 2s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4010
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4010
    ports:
      - "3098:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 2s
      timeout: 5s
      retries: 30
